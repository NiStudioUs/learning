<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | KS Foodie</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="nav-logo">KS Foodie.</a>
            <div class="nav-user">
                <a href="dashboard.html" class="btn-primary btn-sm"
                    style="background: transparent; color: var(--primary-color); border: 1px solid var(--primary-color); box-shadow: none;">Back
                    to Menu</a>
                <div class="user-avatar" id="navUserAvatar"></div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">

        <div class="profile-container" style="padding: 0; overflow: hidden; text-align: left;">
            <!-- Cover Image -->
            <div class="profile-cover"></div>

            <div style="padding: 2rem; text-align: center;">
                <!-- Header -->
                <div class="profile-header">
                    <div class="profile-avatar-large" id="profileAvatar">👤</div>
                    <h2 class="profile-title" id="displayUsername">User</h2>
                    <p style="color: var(--text-light);">Foodie Member</p>
                </div>

                <!-- Stats -->
                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-val" id="statOrders">12</div>
                        <div class="stat-label">Orders</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-val">Indian</div>
                        <div class="stat-label">Favorite</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-val">4.8</div>
                        <div class="stat-label">Rating</div>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="profile-tabs">
                    <button class="tab-btn active" onclick="switchTab('details')">My Details</button>
                    <button class="tab-btn" onclick="switchTab('orders')">Order History</button>
                </div>

                <!-- Tab 1: Details Form -->
                <div id="tab-details" class="tab-content active" style="text-align: left;">
                    <form id="profileForm">
                        <div class="form-group">
                            <label class="form-label" for="usernameField">Username (Read Only)</label>
                            <input type="text" id="usernameField" class="form-input" readonly
                                style="background: #f9f9f9; cursor: not-allowed;">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="displayNameField">Display Name</label>
                            <input type="text" id="displayNameField" class="form-input"
                                placeholder="Enter your display name">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="emailField">Email</label>
                            <input type="email" id="emailField" class="form-input" placeholder="Enter your email">
                        </div>

                        <div class="mt-2" style="display: flex; gap: 1rem; flex-direction: column;">
                            <div style="display: flex; gap: 1rem;">
                                <button type="submit" class="btn-primary" style="flex: 1;">Save Changes</button>
                                <button type="button" id="logoutBtn" class="btn-primary"
                                    style="flex: 1; background: #e0e0e0; color: #333; box-shadow: none; border: 1px solid #ccc;">Logout</button>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Tab 2: Orders List -->
                <div id="tab-orders" class="tab-content" style="text-align: left;">
                    <div id="orderList">
                        <!-- Injected via JS -->
                    </div>
                </div>

            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
</body>

</html>
