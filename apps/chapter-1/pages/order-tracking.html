<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Order | KS Foodie</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="nav-logo">KS Foodie.</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">

        <div class="tracking-container">
            <h1 class="mb-2">Order #<span id="orderId">8293</span></h1>
            <p style="font-size: 1.1rem; color: #666;">Estimated Delivery: <span
                    style="font-weight: 700; color: #333;">30 mins</span></p>

            <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExbDVqZm55bDVqZm55bDVqZm55bDVqZm55bDVqZm55bDVqZm55bDVqZm55bCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDl8XG6uO0yW2dJbZl/giphy.gif"
                alt="Scooter" style="width: 150px; margin: 2rem 0;">

            <!-- Stepper -->
            <div class="tracking-stepper step-1" id="stepper">

                <div class="tracking-step active" id="step1">
                    <div class="step-icon">📋</div>
                    <div class="step-label">Order Placed</div>
                </div>

                <div class="tracking-step" id="step2">
                    <div class="step-icon">🍳</div>
                    <div class="step-label">Preparing</div>
                </div>

                <div class="tracking-step" id="step3">
                    <div class="step-icon">🛵</div>
                    <div class="step-label">On the Way</div>
                </div>

                <div class="tracking-step" id="step4">
                    <div class="step-icon">✅</div>
                    <div class="step-label">Delivered</div>
                </div>

            </div>

            <div id="statusMsg" style="font-size: 1.2rem; font-weight: 600; color: var(--primary-color);">
                We have received your order!
            </div>

            <a href="dashboard.html" class="btn-primary mt-2"
                style="display: inline-block; background: var(--secondary-color);">Back to Home</a>
        </div>

    </main>

    <!-- Scripts -->
    <script src="../js/tracking.js"></script>
</body>

</html>
